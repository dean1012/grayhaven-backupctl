[tool.ruff]
line-length = 88
target-version = "py312"

[tool.ruff.lint]
select = ["B", "E", "F", "I", "PERF", "RUF", "S", "SIM", "UP"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S106", "S108", "SIM117"]

[tool.coverage.run]
branch = true

[tool.coverage.report]
fail_under = 90
omit = ["tests/*"]
show_missing = true
