name: CI

"on":
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate Python
    runs-on: ubuntu-latest
    container: ghcr.io/almalinux/almalinux:10-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Install operating system dependencies
        run: |
          dnf install --assumeyes git nodejs npm python3 python3-libselinux python3-pip

      - name: Install validation tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt
          npm install --global markdownlint-cli2

      - name: Audit Python dependencies
        run: |
          python -m pip_audit --progress-spinner off -r requirements.txt

      - name: Syntax check
        run: |
          python -m py_compile grayhaven-backupctl

      - name: Mypy type check
        run: |
          mypy --strict grayhaven-backupctl

      - name: Ruff lint
        run: |
          ruff check grayhaven-backupctl tests

      - name: Ruff format check
        run: |
          ruff format --check grayhaven-backupctl tests

      - name: Run yamllint
        run: |
          yamllint .

      - name: Run markdownlint
        run: |
          markdownlint-cli2 "**/*.md"
